<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>呼吸文献精选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #f4f6f9; }
        .nav-item { position: relative; transition: all 0.3s; }
        .nav-item.active { color: #ef4444; font-weight: 800; }
        .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 25%; width: 50%; height: 3px; background: #ef4444; border-radius: 10px; }
        .card { background: white; border-radius: 20px; margin: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .ai-summary { background: #fff7f6; border-left: 4px solid #ff4d4f; padding: 12px; border-radius: 8px; font-size: 14px; color: #cf1322; line-height: 1.6; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <header class="sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-sm">
            <div class="px-6 py-4 flex justify-between items-center border-b border-gray-50">
                <h1 class="text-xl font-black text-gray-900">呼吸文献精选</h1>
            </div>
            <!-- 分类切换 -->
            <div class="flex justify-around py-3 px-2 text-sm text-gray-500 font-medium overflow-x-auto whitespace-nowrap">
                <div v-for="(list, name) in allData" 
                     :key="name" 
                     @click="currentCategory = name"
                     :class="['nav-item', {active: currentCategory === name}]">
                    {{ name }}
                </div>
            </div>
        </header>

        <!-- 内容区 -->
        <div v-if="loading" class="text-center py-20 text-gray-400">正在抓取最新文献...</div>
        
        <main v-else class="max-w-2xl mx-auto pt-2">
            <div v-for="paper in allData[currentCategory]" 
                 :key="paper.link" 
                 class="card active:scale-[0.98] transition-transform"
                 @click="window.open(paper.link, '_blank')">
                <div class="flex justify-between text-[10px] font-bold text-blue-500 uppercase mb-2">
                    <span>{{ paper.journal }}</span>
                    <span class="text-gray-300">{{ paper.date.split(' ')[0] }}</span>
                </div>
                <h2 class="text-lg font-bold leading-tight text-gray-800 mb-3">{{ paper.title }}</h2>
                <div class="ai-summary text-sm">
                    <strong>✨ AI 核心结论：</strong><br>{{ paper.summary }}
                </div>
                <div class="text-[11px] text-gray-400 flex justify-between items-center">
                    <span>{{ paper.authors.split(',')[0] }} 等</span>
                    <span class="text-blue-600 font-bold">查看原文 →</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const allData = ref({});
                const currentCategory = ref('肺纤维化');
                const loading = ref(true);

                onMounted(async () => {
                    const res = await fetch('./data.json?t=' + new Date().getTime());
                    allData.value = await res.json();
                    // 设置第一个存在的分类为默认
                    currentCategory.value = Object.keys(allData.value)[0];
                    loading.value = false;
                });
                return { allData, currentCategory, loading };
            }
        }).mount('#app')
    </script>
</body>
</html>
