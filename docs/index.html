<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>呼吸文献精选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
        .card {
            background: white;
            border-radius: 24px;
            margin: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .card:active { transform: scale(0.98); }
        .journal-tag {
            background: #e0f2fe;
            color: #0369a1;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 8px;
            text-transform: uppercase;
        }
        .ai-summary {
            background: #fff7ed;
            border-left: 5px solid #f97316;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            color: #7c2d12;
            margin: 18px 0;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <!-- 头部 -->
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl px-6 py-5 border-b border-gray-100">
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">🫁 呼吸文献精选</h1>
            <p class="text-xs text-gray-400 mt-1 uppercase font-bold tracking-widest">Recent Advancements</p>
        </header>

        <!-- 加载动画 -->
        <div v-if="loading" class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-400 font-medium">正在获取 AI 总结...</p>
        </div>

        <!-- 卡片流 -->
        <main v-else>
            <div v-for="(paper, index) in papers" :key="index" class="card" @click="window.open(paper.link, '_blank')">
                <div class="flex justify-between items-center mb-4">
                    <span class="journal-tag">{{ paper.journal }}</span>
                    <span class="text-[11px] text-gray-400 font-medium">{{ paper.date.split(' ')[0] }}</span>
                </div>

                <h2 class="text-lg font-bold leading-tight text-gray-900 mb-4">
                    {{ paper.title }}
                </h2>

                <div class="ai-summary">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-lg">✨</span>
                        <span class="font-bold text-orange-800 text-sm">AI 核心结论</span>
                    </div>
                    {{ paper.summary }}
                </div>

                <div class="flex justify-between items-center mt-4">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center text-[10px] font-bold text-gray-500">
                            {{ paper.authors ? paper.authors[0] : 'A' }}
                        </div>
                        <span class="text-xs text-gray-500 italic">{{ paper.authors.split(',')[0] }} 等</span>
                    </div>
                    <span class="text-blue-600 font-bold text-xs uppercase tracking-wider">Read Full →</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const papers = ref([]);
                const loading = ref(true);
                onMounted(async () => {
                    try {
                        const res = await fetch('./data.json?t=' + new Date().getTime());
                        papers.value = await res.json();
                    } catch (e) {
                        console.error("加载失败", e);
                    } finally {
                        loading.value = false;
                    }
                });
                return { papers, loading };
            }
        }).mount('#app')
    </script>
</body>
</html>
