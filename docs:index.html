<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>呼吸文献速递</title>
    
    <!-- iOS 优化标签 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="呼吸文献">
    
    <!-- 引入 Tailwind CSS 和 Vue 3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <style>
        /* 瀑布流核心布局 */
        .waterfall-container {
            column-count: 2;
            column-gap: 12px;
            padding: 12px;
        }
        
        /* 适配手机端，防止卡片被切断 */
        .card {
            break-inside: avoid;
            transform: translateZ(0); /* 提高渲染性能 */
        }

        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: #f9f9f9;
            -webkit-tap-highlight-color: transparent;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 导航栏：仿小红书毛玻璃效果 -->
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3">
            <div class="flex justify-between items-center">
                <span class="text-gray-400 text-sm">文献速递</span>
                <h1 class="text-lg font-bold text-gray-900">呼吸科频道</h1>
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center">
                    <span class="text-white text-xs font-bold">New</span>
                </div>
            </div>
        </header>

        <!-- 文献瀑布流 -->
        <main class="waterfall-container">
            <div v-for="(paper, index) in papers" 
                 :key="index" 
                 class="card bg-white rounded-2xl shadow-sm border border-gray-100 mb-3 overflow-hidden active:scale-95 transition-transform duration-200"
                 @click="openLink(paper.link)">
                
                <!-- 卡片内容区 -->
                <div class="p-3">
                    <!-- 杂志名称标签 -->
                    <div class="flex items-center gap-1 mb-2">
                        <span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-0.5 rounded-md font-bold uppercase tracking-wider">
                            {{ paper.journal }}
                        </span>
                    </div>

                    <!-- 标题 -->
                    <h2 class="text-[14px] font-bold leading-snug text-gray-800 mb-2 line-clamp-3">
                        {{ paper.title }}
                    </h2>

                    <!-- AI 核心总结：重点突出 -->
                    <div class="bg-gray-50 rounded-xl p-2.5 mb-3">
                        <p class="text-[12px] text-gray-600 leading-relaxed">
                            <span class="text-red-500 font-bold">✨ 核心：</span>{{ paper.summary }}
                        </p>
                    </div>

                    <!-- 底部信息 -->
                    <div class="flex justify-between items-center pt-2 border-t border-gray-50">
                        <div class="flex items-center gap-1.5">
                            <div class="w-4 h-4 bg-gray-200 rounded-full flex items-center justify-center text-[8px] text-gray-500">
                                {{ paper.authors ? paper.authors[0] : 'A' }}
                            </div>
                            <span class="text-[10px] text-gray-400 truncate w-16">
                                {{ paper.authors.split(',')[0] }}
                            </span>
                        </div>
                        <span class="text-[10px] text-gray-300">{{ paper.date.split(' ')[0] }}</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- 无数据时的占位显示 -->
        <div v-if="papers.length === 0" class="flex flex-col items-center justify-center py-20 text-gray-400">
            <div class="animate-spin mb-4">⌛</div>
            <p class="text-sm">正在加载最新文献...</p>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const papers = ref([]);

                const fetchFiles = async () => {
                    try {
                        // 加上时间戳缓存，确保 GitHub 更新后手机能立刻看到
                        const timestamp = new Date().getTime();
                        const response = await fetch(`./data.json?t=${timestamp}`);
                        if (response.ok) {
                            papers.value = await response.json();
                        }
                    } catch (error) {
                        console.error("加载 JSON 失败:", error);
                    }
                };

                const openLink = (link) => {
                    window.open(link, '_blank');
                };

                onMounted(() => {
                    fetchFiles();
                });

                return {
                    papers,
                    openLink
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
